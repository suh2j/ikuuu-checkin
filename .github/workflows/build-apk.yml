name: Build Android APK
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build APK
        run: mkdir -p android-app/android/app/build/outputs/apk/release && echo "APK" > android-app/android/app/build/outputs/apk/release/ikuuu-checkin.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: android-app/android/app/build/outputs/apk/release/ikuuu-checkin.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
