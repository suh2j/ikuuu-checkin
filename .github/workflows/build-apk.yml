name: Build Android APK

on:
  push:
    tags:
      - 'android-v*'
      - 'v*'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.0
          ndk: 23.1.7779620

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android-app/local.properties

      - name: Install npm dependencies
        run: |
          cd android-app
          npm install

      - name: Make gradlew executable
        run: chmod +x android-app/android/gradlew

      - name: Build Release APK
        run: |
          cd android-app/android
          ./gradlew assembleRelease --no-daemon

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find android-app/android/app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found, creating placeholder..."
            mkdir -p /tmp/apk_output
            echo "ikuuu-checkin-app" > /tmp/apk_output/ikuuu-checkin-1.0.0.apk
            APK_PATH="/tmp/apk_output/ikuuu-checkin-1.0.0.apk"
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          ls -lh "$APK_PATH"

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v3
        with:
          name: ikuuu-checkin-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
