name: Build Android APK
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq android-sdk
      - name: Install dependencies
        run: |
          cd android-app
          npm install
      - name: Build APK
        run: |
          cd android-app/android
          chmod +x gradlew
          ./gradlew assembleRelease || true
      - name: Find and upload APK
        run: |
          find android-app -name "*.apk" -type f -exec ls -lh {} \;
          find android-app -name "*.apk" -type f | head -1 | xargs -I {} cp {} ./app.apk || echo "No APK found"
      - uses: softprops/action-gh-release@v2
        with:
          files: ./app.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: hashFiles('./app.apk') != ''
