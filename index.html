<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iKuuu 签到助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .status-box {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status-title {
            color: #666;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-content {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.6;
        }

        .status-success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }

        .status-success .status-content {
            color: #2e7d32;
        }

        .status-error {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .status-error .status-content {
            color: #c62828;
        }

        .status-loading {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }

        .status-loading .status-content {
            color: #1565c0;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2196f3;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .history h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-time {
            color: #999;
        }

        .history-status {
            font-weight: 600;
        }

        .history-status.success {
            color: #4caf50;
        }

        .history-status.error {
            color: #f44336;
        }

        .info-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #856404;
            line-height: 1.6;
        }

        .info-box strong {
            display: block;
            margin-bottom: 5px;
        }

        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>iKuuu 签到助手</h1>
            <p>一键快速签到，获取每日流量</p>
        </div>

        <div class="info-box">
            <strong>📋 如何获取 Cookie？</strong>
            在 iKuuu 官网登录后，按 F12 打开开发者工具，进入 Console（控制台），输入 <code>document.cookie</code> 并回车，将显示的内容复制粘贴到下方即可。
        </div>

        <div class="form-group">
            <label for="cookie">iKuuu Cookie</label>
            <textarea id="cookie" placeholder="粘贴您的 Cookie 内容..."></textarea>
        </div>

        <div class="button-group">
            <button class="btn-primary" id="checkinBtn" onclick="performCheckin()">立即签到</button>
            <button class="btn-secondary" onclick="clearCookie()">清除</button>
        </div>

        <div id="statusBox" class="status-box" style="display: none;">
            <div class="status-title">签到状态</div>
            <div class="status-content" id="statusContent"></div>
        </div>

        <div class="history" id="historySection" style="display: none;">
            <h3>签到历史</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        // 从 localStorage 加载保存的 Cookie
        window.addEventListener('load', function() {
            const savedCookie = localStorage.getItem('ikuuu_cookie');
            if (savedCookie) {
                document.getElementById('cookie').value = savedCookie;
            }
            loadHistory();
        });

        // 保存 Cookie 到 localStorage
        function saveCookie() {
            const cookie = document.getElementById('cookie').value.trim();
            if (cookie) {
                localStorage.setItem('ikuuu_cookie', cookie);
            }
        }

        // 清除 Cookie
        function clearCookie() {
            if (confirm('确定要清除保存的 Cookie 吗？')) {
                document.getElementById('cookie').value = '';
                localStorage.removeItem('ikuuu_cookie');
                document.getElementById('statusBox').style.display = 'none';
            }
        }

        // 执行签到
        async function performCheckin() {
            const cookie = document.getElementById('cookie').value.trim();
            const btn = document.getElementById('checkinBtn');
            
            if (!cookie) {
                showStatus('error', '❌ 请先输入 Cookie');
                return;
            }

            saveCookie();
            showStatus('loading', '<span class="spinner"></span>正在签到...');
            btn.disabled = true;

            try {
                // 调用后端代理接口
                const response = await fetch('/api/checkin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        cookie: cookie
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    showStatus('success', `✅ ${data.message}`);
                    addHistory('成功', data.message);
                } else {
                    showStatus('error', `❌ ${data.message}`);
                    addHistory('失败', data.message);
                }
            } catch (error) {
                showStatus('error', `❌ 网络错误: ${error.message}`);
                addHistory('错误', error.message);
            } finally {
                btn.disabled = false;
            }
        }

        // 显示状态
        function showStatus(type, message) {
            const statusBox = document.getElementById('statusBox');
            const statusContent = document.getElementById('statusContent');
            
            statusBox.className = 'status-box status-' + type;
            statusContent.innerHTML = message;
            statusBox.style.display = 'flex';
        }

        // 添加历史记录
        function addHistory(status, message) {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN');
            
            let history = JSON.parse(localStorage.getItem('checkin_history') || '[]');
            history.unshift({
                time: timeStr,
                status: status,
                message: message
            });
            
            // 只保留最近 10 条记录
            history = history.slice(0, 10);
            localStorage.setItem('checkin_history', JSON.stringify(history));
            
            loadHistory();
        }

        // 加载历史记录
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('checkin_history') || '[]');
            const historySection = document.getElementById('historySection');
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            
            historySection.style.display = 'block';
            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <span class="history-time">${item.time}</span>
                    <span class="history-status ${item.status.toLowerCase()}">${item.status}</span>
                </div>
            `).join('');
        }

        // 回车快速签到
        document.getElementById('cookie').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                performCheckin();
            }
        });
    </script>
</body>
</html>
